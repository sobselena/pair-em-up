<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/sass/style.css" />
    <title>Pair-em-up</title>
    <script defer type="module" src="src/index.js"></script>
  </head>
  <body class="white-theme">
    <header class="header">
      <div class="wrapper">
        <div class="header__info">
          <div class="header__control-buttons">
            <button class="button control-buttons__continue">
              <img
                src="src/assets/icons/continue.svg"
                alt="continue icon"
                class="icon icon_continue"
              />
            </button>
            <button class="button button_reset">
              <img src="src/assets/icons/reset.svg" alt="reset icon" class="icon icon_reset" />
            </button>
            <button class="button control-buttons__save">
              <img src="src/assets/icons/save.svg" alt="save icon" class="icon icon_save" />
            </button>
          </div>

          <h1 class="header-primary">Pair `em up</h1>

          <div class="header__statistics">
            <div class="header__score-container">
              Score: <span class="statistics__score">5</span>
            </div>
            <div class="header__timer-container">
              Timer: <span class="header__timer">01:55</span>
            </div>
          </div>
        </div>
        <div class="header__assist-tools">
          <button class="button button_hints">
            Hints (<span class="assist-tools__hints-count">5+</span>)
          </button>
          <button class="button assist-tools__revert">Revert</button>
          <button class="button assist-tools__add-numbers">
            Add Numbers (<span class="assist-tools__add-numbers-count">10</span>)
          </button>
          <button class="button button_shuffle">
            Shuffle (<span class="assist-tools__shuffle-count">5</span>)
          </button>
          <button class="button button_eraser">
            Eraser (<span class="assist-tools__eraser-count">5</span>)
          </button>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="wrapper">
        <section class="game-board">
          <div class="game-board__grid">
            <div class="game-board__cell" data-row="0" data-column="0">1</div>
            <div class="game-board__cell" data-row="0" data-column="1">2</div>
            <div class="game-board__cell" data-row="0" data-column="2">3</div>
            <div class="game-board__cell" data-row="0" data-column="3">4</div>
            <div class="game-board__cell" data-row="0" data-column="4">5</div>
            <div class="game-board__cell" data-row="0" data-column="5">6</div>
            <div class="game-board__cell" data-row="0" data-column="6">7</div>
            <div class="game-board__cell" data-row="0" data-column="7">8</div>
            <div class="game-board__cell" data-row="0" data-column="8">9</div>

            <div class="game-board__cell" data-row="1" data-column="0">1</div>
            <div class="game-board__cell" data-row="1" data-column="1">1</div>
            <div class="game-board__cell" data-row="1" data-column="2">1</div>
            <div class="game-board__cell" data-row="1" data-column="3">2</div>
            <div class="game-board__cell" data-row="1" data-column="4">1</div>
            <div class="game-board__cell" data-row="1" data-column="5">3</div>
            <div class="game-board__cell" data-row="1" data-column="6">1</div>
            <div class="game-board__cell" data-row="1" data-column="7">4</div>
            <div class="game-board__cell" data-row="1" data-column="8">1</div>

            <div class="game-board__cell" data-row="2" data-column="0">5</div>
            <div class="game-board__cell" data-row="2" data-column="1">1</div>
            <div class="game-board__cell" data-row="2" data-column="2">6</div>
            <div class="game-board__cell" data-row="2" data-column="3">1</div>
            <div class="game-board__cell" data-row="2" data-column="4">7</div>
            <div class="game-board__cell" data-row="2" data-column="5">1</div>
            <div class="game-board__cell" data-row="2" data-column="6">8</div>
            <div class="game-board__cell" data-row="2" data-column="7">1</div>
            <div class="game-board__cell" data-row="2" data-column="8">9</div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
