<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pair-em-up</title>
    <script defer type="module" src="src/index.js"></script>
  </head>
  <body class="black-theme">
    <header class="header">
      <div class="wrapper">
        <h1 class="header-primary">Pair `em up</h1>
      </div>
    </header>
    <main class="main">
      <div class="wrapper">
        <section class="game-board">
          <div class="game-board__grid">
            <div class="game-board__cell" data-row="0" data-column="0">1</div>
            <div class="game-board__cell" data-row="0" data-column="1">2</div>
            <div class="game-board__cell" data-row="0" data-column="2">3</div>
            <div class="game-board__cell" data-row="0" data-column="3">4</div>
            <div class="game-board__cell" data-row="0" data-column="4">5</div>
            <div class="game-board__cell" data-row="0" data-column="5">6</div>
            <div class="game-board__cell" data-row="0" data-column="6">7</div>
            <div class="game-board__cell" data-row="0" data-column="7">8</div>
            <div class="game-board__cell" data-row="0" data-column="8">9</div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
